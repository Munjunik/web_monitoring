<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automated Aquaponics Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="dashboard">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Automated Aquaponics System</h1>
      </div>

      <div class="topbar-right">
        <div class="time-box">
          <div class="time-label">Current Time</div>
          <div id="currentTime" class="time-value">--:--:--</div>
        </div>
      </div>
    </header>

    <main class="main-grid">
      <!-- 좌측 카메라 -->
      <section class="left-panel">
        <div class="panel-title">Camera Monitoring</div>

        <div class="camera-card">
          <div class="camera-header">
            <span>수경재배부 카메라</span>
            <span class="camera-status">ONLINE</span>
          </div>
          <div class="camera-view">
            <img id="pi1Camera" src="http://192.168.0.172:5000/video" alt="수경재배부 카메라">
          </div>
        </div>

        <div class="camera-card">
          <div class="camera-header">
            <span>발아실 카메라</span>
            <span class="camera-status">ONLINE</span>
          </div>
          <div class="camera-view">
            <img id="pi2Camera" src="http://192.168.0.173:5000/video" alt="발아실 카메라">
          </div>
        </div>

        <div class="camera-card">
          <div class="camera-header">
            <span>파종부 카메라</span>
            <span class="camera-status">ONLINE</span>
          </div>
          <div class="camera-view">
            <img id="pi3Camera" src="http://192.168.0.173:5000/video" alt="파종부  카메라">
          </div>
        </div>
      </section>

      <!-- 중앙 센서 -->
      <section class="center-panel">
        <div class="panel-title">Sensor Dashboard</div>

        <div class="summary-cards">
          <div class="summary-card">
            <div class="summary-label">수위</div>
            <div class="summary-value"><span id="levelValue">320</span> mm</div>
            <div class="summary-unit">range: 0 ~ 500 mm</div>
          </div>

          <div class="summary-card">
            <div class="summary-label">수온</div>
            <div class="summary-value"><span id="tempValue">24.0</span>°C</div>
            <div class="summary-unit">range: 0 ~ 40°C</div>
          </div>

          <div class="summary-card">
            <div class="summary-label">pH</div>
            <div class="summary-value"><span id="phValue">6.80</span></div>
            <div class="summary-unit">range: 0 ~ 14</div>
          </div>

          <div class="summary-card">
            <div class="summary-label">TDS</div>
            <div class="summary-value"><span id="tdsValue">640</span> ppm</div>
            <div class="summary-unit">range: 0 ~ 1000 ppm</div>
          </div>
        </div>

        <div class="chart-grid">
          <div class="chart-card">
            <div class="chart-title">수위 그래프</div>
            <div class="chart-wrap">
              <canvas id="levelChart"></canvas>
            </div>
          </div>

          <div class="chart-card">
            <div class="chart-title">수온 그래프</div>
            <div class="chart-wrap">
              <canvas id="tempChart"></canvas>
            </div>
          </div>

          <div class="chart-card">
            <div class="chart-title">pH 그래프</div>
            <div class="chart-wrap">
              <canvas id="phChart"></canvas>
            </div>
          </div>

          <div class="chart-card">
            <div class="chart-title">TDS 그래프</div>
            <div class="chart-wrap">
              <canvas id="tdsChart"></canvas>
            </div>
          </div>
        </div>
      </section>

      <!-- 우측 이벤트 로그 전용 -->
      <section class="right-panel">
        <div class="panel-title">Event Log</div>

        <div class="log-box full-log-box">
          <div class="log-header-row">
            <div class="info-title">실시간 이벤트 로그</div>
            <button id="clearLogBtn" class="clear-log-btn">로그 비우기</button>
          </div>

          <div id="eventLog" class="log-list"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
